name: Fix SSH access

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/amux_cloud
          chmod 600 ~/.ssh/amux_cloud
          ssh-keyscan -H 5.161.66.217 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Add local public key to authorized_keys
        run: |
          ssh -i ~/.ssh/amux_cloud root@5.161.66.217 'bash -s' << 'ENDSSH'
            KEY="ssh-rsa  ethan@Ethans-Personal-Macbook-2020.local"
            if ! grep -qF "ethan@Ethans-Personal-Macbook-2020.local" /root/.ssh/authorized_keys 2>/dev/null; then
              echo "$KEY" >> /root/.ssh/authorized_keys
              echo "Key added successfully"
            else
              echo "Key already exists"
            fi
            echo "Current authorized_keys:"
            cat /root/.ssh/authorized_keys
          ENDSSH
